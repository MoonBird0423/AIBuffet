# Server configuration
server.port=8080

# 文本处理相关超时设置
spring.mvc.async.request-timeout=1800000
aliyun.oss.connection-timeout=1800000
aliyun.oss.socket-timeout=1800000

# Tika配置
tika.max-text-length=10485760
tika.parser.memory-limit=10485760

# 文本处理配置
text.processing.chunk.max-tokens=512
text.processing.chunk.overlap=100

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3305/aibuffet?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8

# 文件上传配置
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=1024MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=0
spring.mvc.async.request-timeout=600000
server.tomcat.connection-timeout=600000
server.tomcat.max-http-form-post-size=1073741824
server.tomcat.max-swallow-size=1073741824

# Character Encoding Configuration
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
spring.http.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8
spring.http.multipart.enabled=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Peng@0423

# JPA/Hibernate Properties
# JPA/Hibernate detailed logging
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.jdbc.fetch_size=30
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# 数据源配置
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# 事务配置
spring.transaction.default-timeout=180
spring.jpa.properties.hibernate.connection.isolation=2
# Disable Hibernate caching
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.hibernate.persister.entity.AbstractEntityPersister=ERROR
# Configure logging levels
logging.level.root=WARN
logging.level.com.aibuffet.security=ERROR
logging.level.org.springframework.security=ERROR
logging.level.com.aibuffet.controller.ChatController=WARN
logging.level.com.aibuffet.controller.ChatCompletionController=WARN
logging.level.com.aibuffet.config.WebClientConfig=WARN
# 文档服务相关日志配置
logging.level.com.aibuffet.service=ERROR
logging.level.com.aibuffet.service.impl.DocumentServiceImpl=ERROR
logging.level.com.aibuffet.repository.KnowledgeBaseFileRepository=ERROR
logging.level.com.aibuffet.repository.DocFileRepository=ERROR
logging.level.com.aibuffet.repository.KnowledgeBaseRepository=ERROR
logging.level.com.aibuffet.controller.DocumentController=ERROR
logging.level.io.milvus=ERROR
logging.level.com.aibuffet.service.impl.VectorServiceImpl=ERROR

# 日志输出格式
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
spring.output.ansi.enabled=ALWAYS
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# Milvus Configuration
milvus.collection-name=doc_chunks

# 向量化配置
vector.embedding.dimensions=1024
vector.batch.size=10
vector.retry.maxAttempts=5
vector.retry.delay=2000

# WebClient配置
webclient.timeout.connect=5000
webclient.timeout.read=30000
webclient.timeout.write=5000
webclient.max-in-memory-size=10485760

# 异步线程池配置
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-
spring.task.execution.pool.keep-alive=60s

# Aliyun OSS Configuration
aliyun.oss.enabled=true
aliyun.oss.access-key-id=${ALIBABA_CLOUD_ACCESS_KEY_ID}
aliyun.oss.access-key-secret=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
aliyun.oss.bucket-name=aibuffet
aliyun.oss.endpoint=oss-cn-chengdu.aliyuncs.com

# DNS Configuration
dns.nameservers=8.8.8.8:53,114.114.114.114:53,223.5.5.5:53
dns.query-timeout=15
dns.cache-ttl=1800
dns.min-ttl=60
dns.max-queries=5
dns.retries=3

# DNS Monitoring Configuration
monitor.resolver.enabled=true
monitor.resolver.log-level=DEBUG

# 图书解读相关提示词配置
book.interpretation.user-prompt=你作为一个图书解读专家，请按照下面的要求帮我输出图书音频解读稿：\n\n# 图书解读框架\n## 一、开场（30秒定生死）\n- **💎 强吸引力开场（三选一）**  \n  - **悬念痛点**：`例："你所相信的XX真理，可能全是虚构——这本书彻底颠覆了我的认知"`  \n  - **金句冲击**：`(播放书中15秒最高能片段)` + `停顿3秒` + "这仅仅是开始..."  \n  - **场景共鸣**：`例："深夜焦虑XX问题？作者用亲身经历给出了震撼答案"`  \n- **💎 价值预告**：`"本期你将获得：① 核心思想X个 ② 独家解法 ③ 现实启发"`  \n- **极速ID**：`"这里是书意平台，知婷老师为你解读"` *(5秒内)*\n\n## 二、核心暴击点（重要：覆盖全书核心观点，3-8个）\n> `结构：观点→例证→听众价值`  \n1. **观点1**：`"用1句话说清核心"`  \n   - **精妙例证**：`"举个书中案例：..."` *(选最具象的1个)*  \n   - **听众价值**：`"这能帮你解决现实中的XX困境"` *(必须关联痛点)*  \n2. **观点2**：`(同上结构)`  \n   *(💎 过渡技巧：`"如果说第一个观点揭穿了...那第二个则彻底颠覆..."`)*\n\n## 三、深潜时刻（2-5个差异化剖析）\n> `据书籍类型单选最炸点`  \n| 类型       | 剖析方向                  | 关键动作               |\n|------------|---------------------------|------------------------|\n| **工具书** | `亲测方法论有效性`        | 曝实践效果+踩坑经验    |\n| **小说**   | `角色复杂性/隐喻解析`     | 撕开人性矛盾层         |\n| **社科**   | `颠覆性争议点`            | 摆正反观点+你的立场    |\n| **传记**   | `人性高光/至暗时刻`       | 还原真实细节+冲击感    |\n| **科普**   | `科学到生活的转化链`      | 演示知识应用场景       |\n\n## 四、行动（强转化设计）\n- **💎 真实改变**：`"这本书让我从XX变成了XX"` *(具象行为变化)*  \n- **灵魂提问**：`抛1个开放争议问题` → `"交流区等你见解！"`  \n- **精准推荐**：  \n  **适合人群**：[具体画像]  \n  **必读理由**：[用痛点/爽点造句]  \n  *(例："受困拖延症者必看→书中XX法让我3周戒掉刷手机")*\n\n特别注意：\n-不要直接输出要求中的提示词，也不要输出无关的提示内容，保证输出的每一个字都是必要内容。\n-输出内容口语化，保证句子之间衔接自然阅读顺畅，弱化标题增加过渡句。\n-根据文章内容输出约3000~6000个字。

book.mindmap.user-prompt=你是一个脑图专家。请解析用户上传的书籍内容生成脑图，按下面的流程进行解析：\n一、类型识别\n判定为以下类型之一：\n[工具类｜小说类｜人文社科类｜传记与纪实类｜科普类｜学术类]\n\n二、信息提取\n1. 基础信息（必填）：\n- 书籍名称（精确提取）\n- 作者（含国籍，如：马尔克斯（哥伦比亚））\n- 主类型 & 子类型（如：工具类→时间管理；小说类→科幻小说）\n-书籍主题（一句话深度总结)\n2. 章节解析（确保覆盖所有章节内容，如果章节内容过多可将多个章节按文章逻辑合成一个章节）：\n[章节名称] \n├─ 核心观点（每个观点独立节点，论点支持多层级嵌套，一个观点的子观点、案例、结论都放成这个观点的子节点）\n├─ 支撑案例（含数据/实验/故事）\n└─ 推导结论（说明与论点的逻辑关系）\n3. 关键信息（根据文章内容和类型梳理关键信息，至少选2个内容项进行梳理）：\n■ 工具类：\n- 待解决问题（3-5个痛点）\n- 方法论体系（步骤流程）\n- 应用工具（清单化呈现）\n■ 小说类：\n- 角色档案（姓名+核心特征）\n- 关系图谱（可视化箭头连接）\n- 情节里程碑（含关键转折点）\n■ 传记类：\n- 人生坐标轴（时间线标注重大事件，时间：事件）\n- 成就清单（量化呈现）\n- 关键抉择点（影响命运的选择）\n■ 科普类：\n- 核心概念树（专业术语层级化）\n- 实验/现象档案（原理+意义）\n- 现实应用场景（案例说明）\n\n三、请按照下面的格式要求输出前面提取的基础信息、章节信息、扩展信息，层级结构分支数量根据提取的信息进行动态调整，格式要求为markdown。\n# 书名\n## 基础信息\n### 作者\n- **姓名**: xxxxx\n- **国籍**: xxx\n### 分类\n- **主分类**: xxx\n- **子分类**: xx\n### 书籍主题\n- **主题**: xxxx\n## 章节解析\n### 章节名称\n#### xx观点xx\n- **xx子观点xx**：xx说明xx\n- **xx案例xx**：xx说明xx\n- **xx结论xx**：xx说明xx\n## 关键信息\n### xxxx信息名称，比如待解决问题xxx\n- **xx说明xx**\n\n特别注意：\n-类型识别和信息提取过程不用输出，直接输出结构化markdown就行了，切记保证md格式的准确性。\n-严格参照上传内容，确保输出的真实性和完整性。

book.quiz.user-prompt=你作为一个出题专家，请根据文档出10道题目。\n1、信息提取：请先从文档中提取10个核心观点，和支撑该观点的案例、推导出的结论；\n2、出题：围绕每个观点出一道选择题，题目以提取的观点来编写一个案例让用户做出选择，每道题4个选项，只有一个选项是符合作者核心观点的。\n3、解析：给出正确答案选项，并解释该选项为什么是正确的。并给出其他选项错误的原因。\n4、结构化输出markdown格式如下：\n### 001. [题干]\n**选项：** \nA. 内容 \nB. 内容 \nC. 内容 \nD. 内容 \n**答案：** \n[字母] \n**解析：** \n✓ 正确项说明（含观点关联分析）\n✗ 错误项原因（每个选项1句，引用文档矛盾点） \n\n特别注意：\n1、信息提取过程不用输出，直接输出结构化markdown就行了，切记保证md格式的准确性。\n2、严格参照上传内容，确保输出的真实性和完整性。

