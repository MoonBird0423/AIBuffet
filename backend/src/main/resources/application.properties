# Server configuration
server.port=8080

# 文本处理相关超时设置
spring.mvc.async.request-timeout=1800000
aliyun.oss.connection-timeout=1800000
aliyun.oss.socket-timeout=1800000

# Tika配置
tika.max-text-length=10485760
tika.parser.memory-limit=10485760

# 文本处理配置
text.processing.chunk.max-tokens=1024
text.processing.chunk.overlap=100

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3305/aibuffet?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8

# 文件上传配置
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=1024MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=0
spring.mvc.async.request-timeout=600000
server.tomcat.connection-timeout=600000
server.tomcat.max-http-form-post-size=1073741824
server.tomcat.max-swallow-size=1073741824

# Character Encoding Configuration
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
spring.http.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8
spring.http.multipart.enabled=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Peng@0423

# JPA/Hibernate Properties
# JPA/Hibernate detailed logging
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.jdbc.fetch_size=30
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# 数据源配置
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# 事务配置
spring.transaction.default-timeout=180
spring.jpa.properties.hibernate.connection.isolation=2
# Disable Hibernate caching
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.hibernate.persister.entity.AbstractEntityPersister=ERROR
# Configure logging levels
logging.level.com.aibuffet.service=ERROR
logging.level.com.aibuffet.config=ERROR
logging.level.io.milvus=ERROR
logging.level.com.aibuffet.service.impl.VectorServiceImpl=ERROR
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# Milvus Configuration
milvus.collection-name=doc_chunks

# 向量化配置
vector.embedding.dimensions=1024
vector.batch.size=10
vector.retry.maxAttempts=5
vector.retry.delay=2000

# WebClient配置
webclient.timeout.connect=5000
webclient.timeout.read=30000
webclient.timeout.write=5000
webclient.max-in-memory-size=10485760

# 异步线程池配置
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-
spring.task.execution.pool.keep-alive=60s

# CORS configuration
spring.webmvc.cors.allowed-origins=http://localhost:3000
spring.webmvc.cors.allowed-methods=GET,POST,PUT,DELETE
spring.webmvc.cors.allowed-headers=*

# Aliyun OSS Configuration
aliyun.oss.enabled=true
aliyun.oss.access-key-id=${ALIBABA_CLOUD_ACCESS_KEY_ID}
aliyun.oss.access-key-secret=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
aliyun.oss.bucket-name=aibuffet
aliyun.oss.endpoint=oss-cn-chengdu.aliyuncs.com

# DNS Configuration
dns.nameservers=8.8.8.8:53,114.114.114.114:53
dns.query-timeout=10
dns.cache-ttl=1800
dns.min-ttl=60
dns.max-queries=3

# DNS Monitoring Configuration
monitor.resolver.enabled=true
monitor.resolver.log-level=ERROR

# 图书解读相关提示词配置
book.interpretation.user-prompt=你作为一个文档解读专家，现在你正在给你的观众做一本书的解读。请按照下面的模板进行输出：\n\n一、开场白\n在开场白中简单介绍书籍和作者，并充分调动读者的兴趣。\n\n二、创作背景\n1、类型归属：根据书籍内容对书籍进行分类：工具类、小说类、人文社科类、传记与纪实类书籍、科普类。\n2、创作背景（可选）：作者写作动机、时代背景、领域发展现状（例：《人类简史》诞生于全球化与科技爆炸的反思期）。\n3、核心问题：本书试图回答什么问题？（工具书：解决什么痛点？小说：探讨什么主题？）\n\n三、章节解读\n1、根据书籍的章节对内容进行解读：梗概（5-20句话，根据内容多少变化），作者核心观点，案例。\n2、如果书籍包含了多册或多个篇章，直接按册或是篇章进行解读，否则直接按章节进行解读。\n3、（可选）可以针对一些要点可以提出你自己的观点，并引用有据可查的案例、或名人事迹、或名人名言对你的观点进行说明。\n\n四、深度剖析（差异化分析模块，按书籍类型选择）\n1. 工具类书籍\n-核心价值：是否提供可复用的方法论？案例是否贴近实际需求？（如《原子习惯》的"行为设计模板"）\n-实践验证：书中方法是否经过实证检验？附带的练习/工具是否有效？（如编程书的"代码仓库"）\n-适用性批判：文化或场景局限性（如西方管理理论在亚洲的适配性）。\n2. 小说类书籍\n-文学性分析：语言风格（诗意/冷峻/幽默）、象征手法（如《白鲸》中的"白鲸"隐喻）。\n-角色弧光：主角是否完成心理转变？（如《活着》中福贵的"麻木到觉醒"）\n-社会映射：虚构情节对现实的影射（如《1984》的极权主义预警）。\n-开放式讨论：结局的多义性解读（如《盗梦空间》的陀螺是否停止？）。\n3. 人文社科类书籍\n-理论贡献：是否提出新概念/模型？（如《规训与惩罚》中的"全景监狱"）在学术脉络中的位置（继承或反驳哪些学派？）。\n-证据力度：数据来源是否可靠？案例是否具有代表性？\n-跨学科连接：如何与哲学、经济学、心理学等交叉？（如《枪炮、病菌与钢铁》的地理决定论）。\n4. 传记与纪实类书籍\n-真实性权衡：作者是否保持中立？有无美化或刻意回避？（如《成为》中米歇尔·奥巴马对政治争议的处理）\n-人物复杂性：传主的矛盾性（如爱因斯坦的科学天才与婚姻失败）。\n-历史语境还原：是否还原时代细节？（如《切尔诺贝利的悲鸣》中的苏联体制描写）\n5. 科普类书籍\n-知识转化能力：如何将专业术语通俗化？（如《万物简史》用"宇宙的童年"比喻大爆炸）\n-科学严谨性：是否区分"事实"与"假说"？有无过时内容？（如早期科普书对冥王星的描述）\n-读者门槛：是否需要前置知识？适合哪个年龄段？\n\n五、总结\n1、现实意义与延伸思考\n个人意义：比如技能提升、认知刷新、情感共鸣等，请详细展开。\n社会意义：比如揭示问题、推动讨论、提供解决方案，请详细展开。\n争议点（可选）：书中未解决的矛盾或学界批评。保持批判性：即使是经典，也可指出其时代局限。\n给读者的话：可引用名人名言/名人事迹对书籍主题进行升华，鼓励用户进行实践，让解读更具备感染力。\n2、推荐人群\n人群：工具书，适合XX领域初学者/进阶者；小说，偏好XX风格的读者；社科书，对XX议题感兴趣的思考者。\n推荐语：工具书分享实操效果，小说谈阅读时的情感冲击。

book.mindmap.user-prompt=你是一个脑图专家。请解析用户上传的书籍内容生成脑图，按下面的流程进行解析：\n一、类型识别\n判定为以下类型之一：\n[工具类｜小说类｜人文社科类｜传记与纪实类｜科普类｜学术类]\n\n二、信息提取\n1. 基础信息（必填）：\n- 书籍名称（精确提取）\n- 作者（含国籍，如：马尔克斯（哥伦比亚））\n- 主类型 & 子类型（如：工具类→时间管理；小说类→科幻小说）\n-书籍主题（一句话深度总结)\n2. 章节解析（确保覆盖所有章节内容，如果章节内容过多可将多个章节按文章逻辑合成一个章节）：\n[章节名称] \n├─ 核心观点（每个观点独立节点，论点支持多层级嵌套，一个观点的子观点、案例、结论都放成这个观点的子节点）\n├─ 支撑案例（含数据/实验/故事）\n└─ 推导结论（说明与论点的逻辑关系）\n3. 扩展信息（根据文章内容和类型选择扩展信息，至少选2个进行扩展）：\n■ 工具类：\n- 待解决问题（3-5个痛点）\n- 方法论体系（步骤流程图）\n- 应用工具（清单化呈现）\n■ 小说类：\n- 角色档案（姓名+核心特征）\n- 关系图谱（可视化箭头连接）\n- 情节里程碑（含关键转折点）\n■ 传记类：\n- 人生坐标轴（时间线标注重大事件）\n- 成就清单（量化呈现）\n- 关键抉择点（影响命运的选择）\n■ 科普类：\n- 核心概念树（专业术语层级化）\n- 实验/现象档案（原理+意义）\n- 现实应用场景（案例说明）\n\n三、结构化输出模板（markdown格式)\n# 书名\n## 基本信息\n### 作者\n- **姓名**: xxxxx\n- **国籍**: xxx\n### 分类\n- **主分类**: xxx\n- **子分类**: xx\n### 书籍主题\n主题内容xxx\n## 章节名称\n### 观点\n#### 子观点\n- **子观点1**: 案例说明\n- **子观点2**: 案例说明\n## 扩展信息\n### 时间线（可选）\n- **时间1**: 事件1\n- **时间2**: 事件2\n### 人物关系（可选）\n- **小明&王力**: 朋友\n- **大话&留名**: 仇人\n### 其他扩展信息（可选）\n- **扩展字段**: 字段信息\n  - **扩展信息子节点**: 字段信息\n\n特别注意：\n-类型识别和信息提取过程不用输出，直接输出结构化markdown就行了，切记保证md格式的准确性。\n-严格参照上传内容，确保输出的真实性和完整性。

book.quiz.user-prompt=是一个出题专家。请解析用户上传的书籍的主要内容出5道题目，使用标注的json格式输出。
