# Server configuration
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3305/aibuffet?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8

# 文件上传配置
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=0
spring.mvc.async.request-timeout=600000
server.tomcat.connection-timeout=600000
server.tomcat.max-http-form-post-size=1073741824
server.tomcat.max-swallow-size=1073741824

# Character Encoding Configuration
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
spring.http.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8
spring.http.multipart.enabled=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Peng@0423

# JPA/Hibernate Properties
# JPA/Hibernate detailed logging
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.jdbc.fetch_size=30
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# 数据源配置
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# 事务配置
spring.transaction.default-timeout=30
spring.jpa.properties.hibernate.connection.isolation=2
# Disable Hibernate caching
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.hibernate.persister.entity.AbstractEntityPersister=ERROR
# Configure logging levels
logging.level.com.aibuffet.service=INFO
logging.level.com.aibuffet.config=INFO
logging.level.io.milvus=INFO
logging.level.com.aibuffet.service.impl.VectorServiceImpl=INFO
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# 向量化配置
vector.embedding.dimensions=1024
vector.batch.size=10
vector.retry.maxAttempts=3
vector.retry.delay=1000

# WebClient配置
webclient.timeout.connect=5000
webclient.timeout.read=30000
webclient.timeout.write=5000
webclient.max-in-memory-size=10485760

# 异步线程池配置
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=async-task-
spring.task.execution.pool.keep-alive=60s

# CORS configuration
spring.webmvc.cors.allowed-origins=http://localhost:3000
spring.webmvc.cors.allowed-methods=GET,POST,PUT,DELETE
spring.webmvc.cors.allowed-headers=*

# Aliyun OSS Configuration
aliyun.oss.enabled=true
aliyun.oss.access-key-id=${ALIBABA_CLOUD_ACCESS_KEY_ID}
aliyun.oss.access-key-secret=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
aliyun.oss.bucket-name=aibuffet
aliyun.oss.endpoint=oss-cn-chengdu.aliyuncs.com

# DNS Configuration
dns.nameservers=8.8.8.8:53,114.114.114.114:53
dns.query-timeout=10
dns.cache-ttl=1800
dns.min-ttl=60
dns.max-queries=3

# DNS Monitoring Configuration
monitor.resolver.enabled=true
monitor.resolver.log-level=DEBUG
