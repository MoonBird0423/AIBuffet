monitor.resolver.enabled=true
monitor.resolver.log-level=DEBUG

# 图书解读相关提示词配置
book.interpretation.user-prompt=你作为一个图书解读专家，请按照下面的要求帮我输出图书音频解读演讲稿：\n\n#【书籍名称】\n###开场\n【\n-强烈开场，制造悬念/共鸣\n-选项1 (颠覆感)： "如果我说[书中某个最颠覆性的结论]，你会不会觉得我疯了？但《[书名]》就是用无法反驳的逻辑，彻底重塑了我对[相关领域]的认知！今天，让我们冲击思维牢笼！"\n-选项2 (痛点共鸣)： "你是否曾经[书中解决的关键痛点，用听众能立刻代入的场景描述]？翻开《[书名]》之前，我深陷其中；读完最后一页，我找到了[核心解法关键词]。本期解密改变的力量！"\n-选项3 (强烈金句)： 阅读一小段你朗读的书中最具杀伤力的金句 +  "仅仅这一句话，就让我[描述真实感受：如毛骨悚然/豁然开朗]。这本《[书名]》的魔力，远不止于此…"\n】\n【 \n价值预告，比如： "接下来30分钟，你将：1️⃣ 抓住本书​​最颠覆/实用​​的[数字]个核心思想；2️⃣ 理解作者[作者名字]如何[独特方法/视角]揭开真相3️⃣获得【具体可落地启示】，改变你的[相关领域/思维方式]。坐稳了，我们启程！"\n】\n这里是书意平台，知婷老师为你解读\n---\n###为什么要读这本书？\n【 \n身份卡 (极简有力)：​​ "《[书名]》 - [作者名字]。TA是[1个最打动你的身份标签，如：经历战争的历史学家/用物理学写人性的科幻大师]。这本书被誉为[1-2个最具代表性的评价，如：时代警醒之作/改变千万人习惯的行动指南]。它探讨的，正是我们每个人[用听众角度描述核心主题，如：都逃不开的人性困境/都想获得的高效密码]。"\n​​核心问题 (引出价值)：​​ "整本书就在回答： ​​[把核心问题转化为听众关心的问题形式]​​？比如：人类为何总陷战争？如何在忙碌中真正坚持学习？爱为何常常伴随伤害？这正是它穿透纸背的力量！"\n】\n---\n###核心观点1：**【用1句话说清核心】**\n【 \n​​"为什么震撼/精妙？"​​：(用​​1个最具象/贴切的例子或类比​​解释，避免抽象描述) 例："当作者说'国家是想象的共同体'时，我恍然大悟：没有这张身份证，我碰到你，凭什么天然觉得咱是一伙的？这解释了民族主义魔力之源！"\n​​"作者如何证明？"​​：(简述书中​​最有力/有趣的1个证据链/故事片段​​) 例："他用印刷术普及和方言统一，证明了'共同语言'如何锻造民族想象——简直像拼图一样严丝合缝！"\n​​"对我/对你有何用？"​​：(​​关键！​​点明现实价值/思考启发) 例："这让我警惕'宏大叙事'的洗脑，学会分辨哪些是真实联结，哪些是被制造的认同——在信息爆炸时代，这就是防骗基本功！"\n】\n【过渡技巧："如果说第一个观点揭穿了...那第二个则彻底颠覆..."】\n###核心观点2：**【用1句话说清核心】**\n【 其他内容结构同上】\n###核心观点3：**【用1句话说清核心】**\n【 其他内容结构同上】\n###核心观点4：**【用1句话说清核心】**\n【 其他内容结构同上】\n###核心观点5：**【用1句话说清核心】**\n【 其他内容结构同上】\n---\n###独家解读：**【选择一个最值得挖的点】**\n【\n> 据书籍类型选择最炸点\n​​工具书：​"书中方法我用在了哪？亲测效果如何？" ​​(快速分享你亲自尝试书中方法的过程、遇到的坑、真实效果，务必具体、真诚，甚至失败教训更有价值)​​ 例："我用了书里'两分钟启动法'治拖延，结果第一周就栽坑里了——原来我忽略了XX细节，调整后成了救命神技！"\n​​小说："X角色让我泪崩：复杂人性如何被神刻画？" ​​(选一个角色/情节，分析其打动人心的复杂性与现实映照)​​ 例："主角那个看似懦弱的妥协，细品才懂那是深渊前的挣扎——作者笔下的XXX，写尽了普通人在时代洪流中的渺小与尊严！"\n​​社科/科普：​"这个颠覆点，学界在吵什么？我挺谁？" ​​(介绍一个有价值的争议，简述双方观点，并给出你的倾向性解读和理由)​​ 例："有学者质疑'地理决定论'忽视了文化韧性。我的看法是…核心在于动态视角…"\n​​传记/纪实：​"最震撼的真实片段：撕破幻想直面人性" ​​(分享书中一个揭示人性复杂/时代悲剧的纪实片段+你的冲击感)​​ 例："读到传主XX面临XX时的真实日记，那份懦弱与勇气交织…才明白英雄不是神，都是在泥泞里踉跄前行的人！"\n】\n【总结这个"深潜点"的价值：​​ "对我而言，这[细节/争议/角色]才是本书的灵魂刺青，它让我[获得了XX更深层理解/体会到XX复杂性]。"】\n---\n###行动指南：\n【 真实冲击总结：​​ "坦白说，读完《[书名]》，我的[具体方面：如思考方式/某个习惯/对XX事物的态度]被彻底刷新了。它像[比喻，如：一束强光照进思想的暗室/在脑中种下一颗行动的种子]。" (语气可更个人化、带情绪)】\n【 延伸思考/提问 (引发互动)：​​ "但我也留下一个巨大的疑问：[抛出一个开放性问题给听众]。如果你有感悟，评论区等你！" 例："如果'虚构'是人类合作基础，那我们该如何区分有益的'故事'与危险的'谎言'？"】\n【\n"​​如果你​​[描述精准目标用户画像，如：渴望看清复杂规则本质的人/受困于XX坏习惯多年/热爱深邃心理剖析的读者]，这本《[书名]》绝对是​​[使用强烈情感/价值词汇]​​级的体验！" 避免"适合所有人"这种废话。\n​​"我最强烈的推荐理由：​​ [一句话戳中最痛的痛点或最爽的爽点]。" 例："它能让你在自我改变的挫败感里，抓住那根真正能发力的线头！" 或 "它用科幻的冰冷外壳，包裹了对人性最滚烫的悲悯。"\n】\n【​​结束升华 ：​​ 用一句书中最精华金句或你提炼的感悟】\n\n特别提醒（必需遵循）：\n-这是一份演讲稿，不要直接输出【xx】中的内容，根据图书内容进行替换。\n-输出内容口语化，保证句子之间衔接自然阅读顺畅，弱化标题增加过渡句。\n-核心观点输出5-10个。\n-输出字数3000~6000个字。

book.mindmap.user-prompt=你是一个脑图专家。请解析用户上传的书籍内容生成脑图，按下面的流程进行解析：\n一、类型识别\n判定为以下类型之一：\n[工具类｜小说类｜人文社科类｜传记与纪实类｜科普类｜学术类]\n\n二、信息提取\n1. 基础信息（必填）：\n- 书籍名称（精确提取）\n- 作者（含国籍，如：马尔克斯（哥伦比亚））\n- 主类型 & 子类型（如：工具类→时间管理；小说类→科幻小说）\n-书籍主题（一句话深度总结)\n2. 章节解析（确保覆盖所有章节内容，如果章节内容过多可将多个章节按文章逻辑合成一个章节）：\n[章节名称] \n├─ 核心观点（每个观点独立节点，论点支持多层级嵌套，一个观点的子观点、案例、结论都放成这个观点的子节点）\n├─ 支撑案例（含数据/实验/故事）\n└─ 推导结论（说明与论点的逻辑关系）\n3. 关键信息（根据文章内容和类型梳理关键信息，至少选2个内容项进行梳理）：\n■ 工具类：\n- 待解决问题（3-5个痛点）\n- 方法论体系（步骤流程）\n- 应用工具（清单化呈现）\n■ 小说类：\n- 角色档案（姓名+核心特征）\n- 关系图谱（可视化箭头连接）\n- 情节里程碑（含关键转折点）\n■ 传记类：\n- 人生坐标轴（时间线标注重大事件，时间：事件）\n- 成就清单（量化呈现）\n- 关键抉择点（影响命运的选择）\n■ 科普类：\n- 核心概念树（专业术语层级化）\n- 实验/现象档案（原理+意义）\n- 现实应用场景（案例说明）\n\n三、请按照下面的格式要求输出前面提取的基础信息、章节信息、扩展信息，层级结构分支数量根据提取的信息进行动态调整，格式要求为markdown。\n# 书名\n## 基础信息\n### 作者\n- **姓名**: xxxxx\n- **国籍**: xxx\n### 分类\n- **主分类**: xxx\n- **子分类**: xx\n### 书籍主题\n- **主题**: xxxx\n## 章节解析\n### 章节名称\n#### xx观点xx\n- **xx子观点xx**：xx说明xx\n- **xx案例xx**：xx说明xx\n- **xx结论xx**：xx说明xx\n## 关键信息\n### xxxx信息名称，比如待解决问题xxx\n- **xx说明xx**\n\n特别注意：\n-类型识别和信息提取过程不用输出，直接输出结构化markdown就行了，切记保证md格式的准确性。\n-严格参照上传内容，确保输出的真实性和完整性。

book.quiz.user-prompt=你作为一个出题专家，请根据文档出10道题目。\n1、信息提取：请先从文档中提取10个核心观点，和支撑该观点的案例、推导出的结论；\n2、出题：围绕每个观点出一道选择题，题目以提取的观点来编写一个案例让用户做出选择，每道题4个选项，只有一个选项是符合作者核心观点的。\n3、解析：给出正确答案选项，并解释该选项为什么是正确的。并给出其他选项错误的原因。\n4、结构化输出markdown格式如下：\n### 001. [题干]\n**选项：** \nA. 内容 \nB. 内容 \nC. 内容 \nD. 内容 \n**答案：** \n[字母] \n**解析：** \n✓ 正确项说明（含观点关联分析）\n✗ 错误项原因（每个选项1句，引用文档矛盾点） \n\n特别注意：\n1、信息提取过程不用输出，直接输出结构化markdown就行了，切记保证md格式的准确性。\n2、严格参照上传内容，确保输出的真实性和完整性。

