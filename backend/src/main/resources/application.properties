# Server configuration
server.port=8080

# 文本处理相关超时设置
spring.mvc.async.request-timeout=1800000
aliyun.oss.connection-timeout=1800000
aliyun.oss.socket-timeout=1800000

# 语音合成配置
audio.synthesis.timeout=600
audio.synthesis.max-retries=3
audio.synthesis.retry-delay=5000

# Tika配置
tika.max-text-length=10485760
tika.parser.memory-limit=10485760

# 文本处理配置
text.processing.chunk.max-tokens=512
text.processing.chunk.overlap=100

# MySQL Database Configuration
spring.datasource.url=${AIBUFFET_DATASOURCE_URL}

# 文件上传配置
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=1024MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=0
spring.mvc.async.request-timeout=600000
server.tomcat.connection-timeout=600000
server.tomcat.max-http-form-post-size=1073741824
server.tomcat.max-swallow-size=1073741824

# Character Encoding Configuration
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
spring.http.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8
spring.http.multipart.enabled=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${AIBUFFET_DATASOURCE_USERNAME}
spring.datasource.password=${AIBUFFET_DATASOURCE_PASSWORD}

# Flyway Database Migration Configuration (临时禁用验证以修复V19)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true
spring.flyway.clean-disabled=true

# JPA/Hibernate Properties
# JPA/Hibernate detailed logging
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.jdbc.fetch_size=30
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# 数据源配置
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# 事务配置
spring.transaction.default-timeout=180
spring.jpa.properties.hibernate.connection.isolation=2
# Disable Hibernate caching
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.hibernate.persister.entity.AbstractEntityPersister=ERROR
# Configure logging levels
logging.level.root=WARN
logging.level.com.aibuffet.security=ERROR
logging.level.org.springframework.security=ERROR
logging.level.com.aibuffet.common=ERROR
logging.level.com.aibuffet.controller.ChatController=ERROR
logging.level.com.aibuffet.controller.ChatCompletionController=ERROR
logging.level.com.aibuffet.controller.ChatCompletionWebSocketHandler=ERROR
logging.level.com.aibuffet.service.ChatCompletionService=ERROR
logging.level.com.aibuffet.service.impl.ChatCompletionServiceImpl=ERROR
logging.level.com.aibuffet.service.ChatService=ERROR
logging.level.com.aibuffet.service.impl.ChatServiceImpl=ERROR
logging.level.com.aibuffet.config.WebClientConfig=ERROR
logging.level.com.aibuffet.config.WebSocketConfig=ERROR
# 文档服务相关日志配置
logging.level.com.aibuffet.service=ERROR
logging.level.com.aibuffet.service.MultiRoleAudioSynthesisService=INFO
logging.level.com.aibuffet.service.impl.DocumentServiceImpl=ERROR
logging.level.com.aibuffet.repository.KnowledgeBaseFileRepository=ERROR
logging.level.com.aibuffet.repository.DocFileRepository=DEBUG
logging.level.com.aibuffet.repository.KnowledgeBaseRepository=ERROR
logging.level.com.aibuffet.controller.DocumentController=ERROR
logging.level.io.milvus=ERROR
logging.level.com.aibuffet.service.impl.VectorServiceImpl=ERROR

# 日志输出格式
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
spring.output.ansi.enabled=ALWAYS
logging.charset.console=UTF-8
logging.charset.file=UTF-8

# Milvus Configuration
milvus.collection-name=doc_chunks

# 向量化配置
vector.embedding.dimensions=1024
vector.batch.size=10
vector.retry.maxAttempts=5
vector.retry.delay=2000

# WebClient配置
webclient.timeout.connect=5000
webclient.timeout.read=30000
webclient.timeout.write=5000
webclient.max-in-memory-size=10485760

# 异步线程池配置
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-
spring.task.execution.pool.keep-alive=60s

# Aliyun OSS Configuration
aliyun.oss.enabled=true
aliyun.oss.access-key-id=${ALIBABA_CLOUD_ACCESS_KEY_ID}
aliyun.oss.access-key-secret=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
aliyun.oss.bucket-name=${AIBUFFET_OSS_BUCKET_NAME}
aliyun.oss.endpoint=${AIBUFFET_OSS_ENDPOINT}

# DNS Configuration
dns.nameservers=8.8.8.8:53,114.114.114.114:53,223.5.5.5:53
dns.query-timeout=15
dns.cache-ttl=1800
dns.min-ttl=60
dns.max-queries=5
dns.retries=3

# DNS Monitoring Configuration
monitor.resolver.enabled=true
monitor.resolver.log-level=DEBUG


# JWT配置
jwt.expiration=${AIBUFFET_JWT_EXPIRATION:86400000}
jwt.secret=${AIBUFFET_JWT_SECRET:rEyMZrXHvZOEaiubMmKsGunV0QOnmoghdJ+UffBR6dARnw8KAQngUg3s2tCd1F6AiVbLBSPbmYYV/FAqJQpF9MO9bf2ggYcZvJmfiP55PKLYPKk+gXp7T78JWiHV+F6C}

# 默认AI模型配置
ai.chat.default.model=${AIBUFFET_DEFAULT_CHAT_MODEL:deepseek-chat}

# 短信服务配置
sms.verification-template-code=${SMS_VERIFICATION_TEMPLATE_CODE:SMS_490045471}
sms.endpoint=${SMS_ENDPOINT:dysmsapi.aliyuncs.com}
sms.code-expiration-minutes=${SMS_CODE_EXPIRATION_MINUTES:5}
sms.rate-limit-per-minute=${SMS_RATE_LIMIT_PER_MINUTE:3}

# WebClient和网络相关日志
logging.level.org.springframework.web.reactive.function.client.WebClient=INFO
logging.level.reactor.netty=INFO
logging.level.io.netty=INFO
