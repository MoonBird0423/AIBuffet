<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DouChat - 让文档开口说话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background-image: url('https://images.unsplash.com/photo-1499750310107-5fef28a66643?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1170&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body>
    <div class="flex min-h-screen">
        <!-- Left side - Image (was previously Right side) -->
        <div class="hidden md:block md:w-1/2 login-container">
            <div class="h-full flex items-center justify-center bg-black bg-opacity-50">
                <div class="text-center text-white p-8">
                    <h2 class="text-4xl font-bold mb-4">知识的力量</h2>
                    <p class="text-xl">让AI赋能您的文档，智能问答尽在指尖</p>
                </div>
            </div>
        </div>
        
        <!-- Right side - Login Form (was previously Left side) -->
        <div class="w-full md:w-1/2 flex flex-col justify-center items-center p-8">
            <div class="w-full max-w-md">
                <div class="text-center mb-10">
                    <h1 class="text-4xl font-bold text-blue-600 mb-2">DocuChat</h1>
                    <p class="text-gray-600 text-xl">让文档开口说话，从此知识不再沉默</p>
                </div>
                
                <form class="bg-white p-8 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">欢迎登录</h2>
                    
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="phone">
                            手机号码
                        </label>
                        <div class="flex">
                            <span class="inline-flex items-center px-3 text-gray-500 bg-gray-100 rounded-l-md border border-r-0 border-gray-300">
                                <i class="fas fa-mobile-alt"></i>
                            </span>
                            <input class="appearance-none border border-gray-300 rounded-r-md w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" 
                                id="phone" type="tel" placeholder="请输入手机号码">
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="verificationCode">
                            验证码
                        </label>
                        <div class="flex">
                            <span class="inline-flex items-center px-3 text-gray-500 bg-gray-100 rounded-l-md border border-r-0 border-gray-300">
                                <i class="fas fa-key"></i>
                            </span>
                            <input class="appearance-none border border-gray-300 border-r-0 w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" 
                                id="verificationCode" type="text" placeholder="请输入验证码">
                            <button type="button" class="bg-blue-100 text-blue-700 font-medium px-6 whitespace-nowrap rounded-r-md border border-l-0 border-gray-300 hover:bg-blue-200 transition-colors">
                                获取验证码
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center">
                            <input id="remember" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <label for="remember" class="ml-2 block text-sm text-gray-700">记住我</label>
                        </div>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-800">登录遇到问题?</a>
                    </div>
                    
                    <a href="knowledge-grid.html" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition-colors flex items-center justify-center">
                        登录
                    </a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
