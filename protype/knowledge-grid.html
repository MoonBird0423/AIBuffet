<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DouChat - 知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pt-16">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm fixed top-0 left-0 right-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="#" class="text-2xl font-bold text-blue-600">DocuChat</a>
                </div>
                <div class="hidden md:block absolute left-1/2 transform -translate-x-1/2">
                    <div class="flex space-x-8">
                        <a href="#" class="text-base font-medium text-blue-600 h-16 flex items-center">公开知识库</a>
                        <a href="my-knowledge.html" class="text-base font-medium text-gray-500 hover:text-gray-700 h-16 flex items-center">我的知识库</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="relative flex items-center">
                        <img class="h-8 w-8 rounded-full" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                        <span class="ml-2 text-sm font-medium text-gray-700">username</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Slogan -->
        <div class="text-center mb-10">
            <p class="text-xl md:text-2xl font-light text-gray-600 tracking-wide">"📢在对话中学习知识📖"</p>
        </div>

        <!-- Search and Filter -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-full max-w-2xl flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fas fa-search text-gray-400"></i>
                    </span>
                    <input type="text" placeholder="搜索知识库" class="pl-10 pr-4 py-2 w-full border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div class="flex">
                    <a href="knowledge-chat.html" class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-700 transition-colors flex items-center">
                        <i class="fas fa-plus mr-2"></i> 开启对话
                    </a>
                </div>
            </div>
        </div>

        <!-- Category Tags and Filter -->
        <div class="mb-6 flex flex-wrap items-center justify-between">
            <ul class="flex flex-wrap text-sm font-medium">
                <li class="mr-6">
                    <a href="#" class="inline-block py-3 px-2 text-blue-600 font-medium">全部</a>
                </li>
                <li class="mr-6">
                    <a href="#" class="inline-block py-3 px-2 text-gray-500 hover:text-gray-700">科技</a>
                </li>
                <li class="mr-6">
                    <a href="#" class="inline-block py-3 px-2 text-gray-500 hover:text-gray-700">文学</a>
                </li>
                <li class="mr-6">
                    <a href="#" class="inline-block py-3 px-2 text-gray-500 hover:text-gray-700">流行</a>
                </li>
                <li class="mr-6">
                    <a href="#" class="inline-block py-3 px-2 text-gray-500 hover:text-gray-700">文化</a>
                </li>
                <li class="mr-6">
                    <a href="#" class="inline-block py-3 px-2 text-gray-500 hover:text-gray-700">生活</a>
                </li>
                <li class="mr-6">
                    <a href="#" class="inline-block py-3 px-2 text-gray-500 hover:text-gray-700">经管</a>
                </li>
            </ul>
            
            <div class="relative">
                <select class="appearance-none bg-white border border-gray-300 rounded-md py-2 pl-3 pr-8 text-gray-700 text-sm leading-4 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500">
                    <option selected>最新</option>
                    <option>最多人用</option>
                    <option>最多文档</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-700">
                    <i class="fas fa-chevron-down text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Knowledge Base Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Knowledge Base Card 1 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden">
                <!-- Knowledge Base Cover -->
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">5个文档</span>
                        </div>
                    </div>
                </a>
                <!-- Knowledge Base Info -->
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">产品使用手册</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <img class="h-5 w-5 rounded-full mr-2 object-cover" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                            <span class="truncate">张小明</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>148</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Knowledge Base Card 2 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden">
                <!-- Knowledge Base Cover -->
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">12个文档</span>
                        </div>
                    </div>
                </a>
                <!-- Knowledge Base Info -->
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">财务报表分析</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <img class="h-5 w-5 rounded-full mr-2 object-cover" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                            <span class="truncate">李伟</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>324</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Knowledge Base Card 3 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden">
                <!-- Knowledge Base Cover -->
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">8个文档</span>
                        </div>
                    </div>
                </a>
                <!-- Knowledge Base Info -->
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">营销策略指南</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <img class="h-5 w-5 rounded-full mr-2 object-cover" src="https://images.unsplash.com/photo-1580489944761-15a19d654956?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                            <span class="truncate">王芳</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>212</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Knowledge Base Card 4 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden">
                <!-- Knowledge Base Cover -->
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">4个文档</span>
                        </div>
                    </div>
                </a>
                <!-- Knowledge Base Info -->
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">技术文档库</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <img class="h-5 w-5 rounded-full mr-2 object-cover" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                            <span class="truncate">赵强</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>98</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Knowledge Base Card 5 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden">
                <!-- Knowledge Base Cover -->
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">7个文档</span>
                        </div>
                    </div>
                </a>
                <!-- Knowledge Base Info -->
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">客户调研资料</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <img class="h-5 w-5 rounded-full mr-2 object-cover" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                            <span class="truncate">张小明</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>176</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Knowledge Base Card 6 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden">
                <!-- Knowledge Base Cover -->
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">3个文档</span>
                        </div>
                    </div>
                </a>
                <!-- Knowledge Base Info -->
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">项目计划书</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <img class="h-5 w-5 rounded-full mr-2 object-cover" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                            <span class="truncate">李伟</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>64</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="py-6 border-t border-gray-200 mt-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-start">
                <div class="mb-4 md:mb-0 pt-2">
                    <h3 class="text-lg font-bold text-blue-600">DocuChat</h3>
                    <p class="text-sm text-gray-600">在对话中学习知识</p>
                </div>
                <div class="flex flex-col items-center self-center">
                    <div class="w-24 h-24 bg-gray-200 flex items-center justify-center rounded-md mb-2">
                        <i class="fas fa-qrcode text-gray-500 text-3xl"></i>
                    </div>
                    <p class="text-xs text-gray-500">扫码联系我们</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
