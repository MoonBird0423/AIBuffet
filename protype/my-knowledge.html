<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DouChat - 我的知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pt-16">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm fixed top-0 left-0 right-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="#" class="text-2xl font-bold text-blue-600">DocuChat</a>
                </div>
                <div class="hidden md:block absolute left-1/2 transform -translate-x-1/2">
                    <div class="flex space-x-8">
                        <a href="knowledge-grid.html" class="text-base font-medium text-gray-500 hover:text-gray-700 h-16 flex items-center">公开知识库</a>
                        <a href="my-knowledge.html" class="text-base font-medium text-blue-600 h-16 flex items-center">我的知识库</a>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="relative flex items-center">
                        <img class="h-8 w-8 rounded-full" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                        <span class="ml-2 text-sm font-medium text-gray-700">username</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- User Profile Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-8">
            <div class="flex flex-col md:flex-row items-center md:items-start">
                <div class="flex-shrink-0 mb-4 md:mb-0 md:mr-6">
                    <img class="h-16 w-16 rounded-full object-cover border-4 border-white shadow" 
                         src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=200&q=80" 
                         alt="User Profile">
                </div>
                <div class="flex-1 text-center md:text-left">
                    <h2 class="text-2xl font-bold text-gray-800">张小明</h2>
                    <p class="text-gray-600 mt-1">已创建 8 个知识库</p>
                </div>
            </div>
        </div>

        <!-- Search and Create -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="relative flex-grow max-w-md w-full">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                    <i class="fas fa-search text-gray-400"></i>
                </span>
                <input type="text" placeholder="搜索我的知识库" class="pl-10 pr-4 py-2 w-full border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>
            <div class="flex">
                <a href="create-knowledge.html" class="px-4 py-2 rounded-md bg-blue-600 text-white hover:bg-blue-700 transition-colors flex items-center">
                    <i class="fas fa-plus mr-2"></i> 创建知识库
                </a>
            </div>
        </div>

        <!-- My Knowledge Base Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Knowledge Base Card 1 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden group">
                <!-- Knowledge Base Cover -->
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-blue-500 to-indigo-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">5个文档</span>
                        </div>
                        <!-- Delete button - only shows on hover -->
                        <button class="absolute top-2 right-2 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full p-2 text-white opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.preventDefault(); confirm('确定要删除这个知识库吗？')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </a>
                <!-- Knowledge Base Info -->
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">产品使用手册</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <i class="fas fa-calendar-alt mr-1"></i>
                            <span>创建于 2023-10-15</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>148</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Knowledge Base Card 2 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden group">
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-green-500 to-teal-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">12个文档</span>
                        </div>
                        <button class="absolute top-2 right-2 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full p-2 text-white opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.preventDefault(); confirm('确定要删除这个知识库吗？')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </a>
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">财务报表分析</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <i class="fas fa-calendar-alt mr-1"></i>
                            <span>创建于 2023-09-28</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>324</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Knowledge Base Card 3 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden group">
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-purple-500 to-pink-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">8个文档</span>
                        </div>
                        <button class="absolute top-2 right-2 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full p-2 text-white opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.preventDefault(); confirm('确定要删除这个知识库吗？')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </a>
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">营销策略指南</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <i class="fas fa-calendar-alt mr-1"></i>
                            <span>创建于 2023-09-12</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>212</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Knowledge Base Card 4 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden group">
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-red-500 to-orange-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">4个文档</span>
                        </div>
                        <button class="absolute top-2 right-2 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full p-2 text-white opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.preventDefault(); confirm('确定要删除这个知识库吗？')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </a>
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">技术文档库</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <i class="fas fa-calendar-alt mr-1"></i>
                            <span>创建于 2023-08-30</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>98</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Knowledge Base Card 5 -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow overflow-hidden group">
                <a href="knowledge-detail.html" class="block">
                    <div class="h-32 bg-gradient-to-r from-yellow-500 to-amber-600 relative flex items-center justify-center">
                        <div class="flex flex-col items-center justify-center text-white">
                            <i class="fas fa-robot text-4xl opacity-70"></i>
                            <span class="mt-1 text-sm font-medium">7个文档</span>
                        </div>
                        <button class="absolute top-2 right-2 bg-white bg-opacity-20 hover:bg-opacity-30 rounded-full p-2 text-white opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.preventDefault(); confirm('确定要删除这个知识库吗？')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </a>
                <div class="p-4">
                    <a href="knowledge-detail.html" class="block">
                        <h3 class="font-semibold text-lg text-gray-800 mb-4 truncate">客户调研资料</h3>
                    </a>
                    <div class="flex items-center justify-between text-sm text-gray-500">
                        <div class="flex items-center">
                            <i class="fas fa-calendar-alt mr-1"></i>
                            <span>创建于 2023-08-12</span>
                        </div>
                        <div class="flex items-center">
                            <i class="fas fa-users mr-1"></i>
                            <span>176</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="py-6 border-t border-gray-200 mt-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-start">
                <div class="mb-4 md:mb-0 pt-2">
                    <h3 class="text-lg font-bold text-blue-600">DocuChat</h3>
                    <p class="text-sm text-gray-600">在对话中学习知识</p>
                </div>
                <div class="flex flex-col items-center self-center">
                    <div class="w-24 h-24 bg-gray-200 flex items-center justify-center rounded-md mb-2">
                        <i class="fas fa-qrcode text-gray-500 text-3xl"></i>
                    </div>
                    <p class="text-xs text-gray-500">扫码联系我们</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
