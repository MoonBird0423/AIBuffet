<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DouChat - 创建知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="knowledge-grid.html" class="text-2xl font-bold text-blue-600">DouChat</a>
                    <span class="ml-2 text-sm text-gray-500">让文档开口说话</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-bell"></i>
                    </button>
                    <div class="relative">
                        <img class="h-8 w-8 rounded-full" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=100&q=80" alt="User">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Back Button -->
        <div class="mb-6">
            <a href="knowledge-grid.html" class="text-blue-600 hover:text-blue-800 inline-flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> 返回知识库列表
            </a>
        </div>
        
        <!-- Create Knowledge Base Form -->
        <div class="bg-white rounded-xl shadow-sm max-w-3xl mx-auto p-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-8">创建新知识库</h1>
            
            <form>
                <!-- Knowledge Base Name -->
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="knowledgeBaseName">
                        知识库名称 <span class="text-red-500">*</span>
                    </label>
                    <input class="appearance-none border border-gray-300 rounded-md w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" 
                        id="knowledgeBaseName" type="text" placeholder="输入知识库名称" required>
                    <p class="text-sm text-gray-500 mt-1">名称应简洁明了，反映知识库的主要内容</p>
                </div>
                
                <!-- Knowledge Base Description -->
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="description">
                        知识库描述
                    </label>
                    <textarea class="appearance-none border border-gray-300 rounded-md w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" 
                        id="description" rows="3" placeholder="输入知识库描述（可选）"></textarea>
                </div>
                
                <!-- Visibility Option -->
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        可见性
                    </label>
                    <div class="flex items-start space-x-6">
                        <div class="flex items-start">
                            <input type="radio" id="private" name="visibility" value="private" class="h-4 w-4 mt-1 text-blue-600 focus:ring-blue-500 border-gray-300" checked onchange="toggleCategoryVisibility()">
                            <label for="private" class="ml-2 block text-gray-700">
                                私有
                                <span class="text-sm text-gray-500 block">仅自己可访问</span>
                            </label>
                        </div>
                        <div class="flex items-start">
                            <input type="radio" id="public" name="visibility" value="public" class="h-4 w-4 mt-1 text-blue-600 focus:ring-blue-500 border-gray-300" onchange="toggleCategoryVisibility()">
                            <label for="public" class="ml-2 block text-gray-700">
                                公开
                                <span class="text-sm text-gray-500 block">所有人可访问</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- Knowledge Base Category - Initially Hidden -->
                <div id="categorySection" class="mb-6 hidden">
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="category">
                        分类
                    </label>
                    <div class="relative">
                        <select class="appearance-none border border-gray-300 rounded-md w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" 
                            id="category">
                            <option value="" disabled selected>选择分类</option>
                            <option value="business">商业文档</option>
                            <option value="technical">技术文档</option>
                            <option value="research">研究资料</option>
                            <option value="marketing">市场营销</option>
                            <option value="other">其他</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
                            <i class="fas fa-chevron-down text-gray-400"></i>
                        </div>
                    </div>
                </div>
                
                <!-- Color Identifier -->
                <div class="mb-8 relative">
                    <label class="block text-gray-700 text-sm font-bold mb-2">
                        标识颜色
                    </label>
                    <!-- Color Bar Display -->
                    <div class="flex items-center">
                        <div id="colorDisplay" class="h-8 w-16 bg-blue-500 rounded-md cursor-pointer border border-gray-300"></div>
                        <span id="colorValueDisplay" class="ml-3 text-sm text-gray-600">#3b82f6</span>
                    </div>
                    <input type="hidden" id="selectedColor" value="#3b82f6">
                    
                    <!-- Color Popup -->
                    <div id="colorPopup" class="hidden absolute z-10 mt-2 p-4 bg-white rounded-lg shadow-lg border border-gray-200 w-72">
                        <div class="grid grid-cols-10 gap-2 mb-3">
                            <!-- Color Blocks - Row 1 -->
                            <div class="h-6 w-6 bg-red-500 rounded-md cursor-pointer color-block" data-color="#ef4444"></div>
                            <div class="h-6 w-6 bg-orange-500 rounded-md cursor-pointer color-block" data-color="#f97316"></div>
                            <div class="h-6 w-6 bg-amber-500 rounded-md cursor-pointer color-block" data-color="#f59e0b"></div>
                            <div class="h-6 w-6 bg-yellow-500 rounded-md cursor-pointer color-block" data-color="#eab308"></div>
                            <div class="h-6 w-6 bg-lime-500 rounded-md cursor-pointer color-block" data-color="#84cc16"></div>
                            <div class="h-6 w-6 bg-green-500 rounded-md cursor-pointer color-block" data-color="#22c55e"></div>
                            <div class="h-6 w-6 bg-emerald-500 rounded-md cursor-pointer color-block" data-color="#10b981"></div>
                            <div class="h-6 w-6 bg-teal-500 rounded-md cursor-pointer color-block" data-color="#14b8a6"></div>
                            <div class="h-6 w-6 bg-cyan-500 rounded-md cursor-pointer color-block" data-color="#06b6d4"></div>
                            <div class="h-6 w-6 bg-sky-500 rounded-md cursor-pointer color-block" data-color="#0ea5e9"></div>
                            
                            <!-- Color Blocks - Row 2 -->
                            <div class="h-6 w-6 bg-blue-500 rounded-md cursor-pointer color-block" data-color="#3b82f6"></div>
                            <div class="h-6 w-6 bg-indigo-500 rounded-md cursor-pointer color-block" data-color="#6366f1"></div>
                            <div class="h-6 w-6 bg-violet-500 rounded-md cursor-pointer color-block" data-color="#8b5cf6"></div>
                            <div class="h-6 w-6 bg-purple-500 rounded-md cursor-pointer color-block" data-color="#a855f7"></div>
                            <div class="h-6 w-6 bg-fuchsia-500 rounded-md cursor-pointer color-block" data-color="#d946ef"></div>
                            <div class="h-6 w-6 bg-pink-500 rounded-md cursor-pointer color-block" data-color="#ec4899"></div>
                            <div class="h-6 w-6 bg-rose-500 rounded-md cursor-pointer color-block" data-color="#f43f5e"></div>
                            <div class="h-6 w-6 bg-gray-500 rounded-md cursor-pointer color-block" data-color="#6b7280"></div>
                            <div class="h-6 w-6 bg-gray-700 rounded-md cursor-pointer color-block" data-color="#374151"></div>
                            <div class="h-6 w-6 bg-slate-500 rounded-md cursor-pointer color-block" data-color="#64748b"></div>
                        </div>
                        
                        <div class="flex items-center">
                            <label class="block text-gray-700 text-sm mr-2" for="customColor">
                                自定义颜色:
                            </label>
                            <input type="color" id="customColor" class="h-8 w-10 border-0 p-0 cursor-pointer" value="#3b82f6">
                            <input type="text" id="colorHex" class="ml-2 w-24 border border-gray-300 rounded-md py-1 px-2 text-xs text-gray-700" value="#3b82f6">
                        </div>
                    </div>
                </div>
                
                <!-- Submit Buttons -->
                <div class="flex justify-end space-x-4">
                    <a href="knowledge-grid.html" class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        取消
                    </a>
                    <a href="knowledge-detail.html" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        创建知识库
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Function to toggle category visibility based on public/private selection
        function toggleCategoryVisibility() {
            const publicRadio = document.getElementById('public');
            const categorySection = document.getElementById('categorySection');
            
            if (publicRadio.checked) {
                categorySection.classList.remove('hidden');
            } else {
                categorySection.classList.add('hidden');
            }
        }

        // Set up color selection
        document.addEventListener('DOMContentLoaded', function() {
            const colorBlocks = document.querySelectorAll('.color-block');
            const customColor = document.getElementById('customColor');
            const colorHex = document.getElementById('colorHex');
            const selectedColor = document.getElementById('selectedColor');
            const colorDisplay = document.getElementById('colorDisplay');
            const colorValueDisplay = document.getElementById('colorValueDisplay');
            const colorPopup = document.getElementById('colorPopup');
            
            // Set initial selected state for blue color
            const blueColorBlock = document.querySelector('[data-color="#3b82f6"]');
            blueColorBlock.classList.add('ring-2', 'ring-offset-2', 'ring-gray-400');
            
            // Toggle color popup
            colorDisplay.addEventListener('click', function() {
                colorPopup.classList.toggle('hidden');
            });
            
            // Close popup when clicking outside
            document.addEventListener('click', function(event) {
                if (!colorPopup.contains(event.target) && event.target !== colorDisplay) {
                    colorPopup.classList.add('hidden');
                }
            });
            
            // Handle color block selection
            colorBlocks.forEach(block => {
                block.addEventListener('click', function() {
                    // Remove highlight from all blocks
                    colorBlocks.forEach(b => b.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-400'));
                    // Add highlight to selected block
                    this.classList.add('ring-2', 'ring-offset-2', 'ring-gray-400');
                    
                    const color = this.getAttribute('data-color');
                    updateSelectedColor(color);
                    colorPopup.classList.add('hidden');
                });
            });
            
            // Handle custom color input
            customColor.addEventListener('input', function() {
                const color = this.value;
                colorHex.value = color;
                updateSelectedColor(color);
                
                // Remove highlight from all blocks
                colorBlocks.forEach(b => b.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-400'));
            });
            
            // Handle hex input
            colorHex.addEventListener('input', function() {
                const color = this.value;
                if (/^#[0-9A-F]{6}$/i.test(color)) {
                    customColor.value = color;
                    updateSelectedColor(color);
                    
                    // Remove highlight from all blocks
                    colorBlocks.forEach(b => b.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-400'));
                }
            });
            
            // Function to update the selected color everywhere
            function updateSelectedColor(color) {
                selectedColor.value = color;
                colorDisplay.style.backgroundColor = color;
                colorValueDisplay.textContent = color;
            }
        });
    </script>
</body>
</html>
