<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学习助手 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden; /* Prevent horizontal scroll on small animations */
            /* Updated animated gradient background for blue theme */
            background: linear-gradient(-45deg, #001233, #002855, #0353A4, #023E7D);
            background-size: 400% 400%;
            animation: animatedGradient 20s ease infinite; /* 动画时长20秒，无限循环 */
            position: relative;
        }

        /* Apple-like subtle grid pattern overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        @keyframes animatedGradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        /* Teacher image with blue glow effect */
        .teacher-image-container {
            animation: slideInFromLeft 1s ease-out forwards;
        }
        .teacher-image-container img {
            animation: imageGlow 2.5s ease-in-out infinite alternate;
        }

        @keyframes imageGlow {
            from {
                /* 蓝色霓虹灯效果 - 较大光晕 - 较暗状态 */
                box-shadow:
                    0 0 10px rgba(0, 149, 255, 0.6),
                    0 0 20px rgba(0, 149, 255, 0.5),
                    0 0 40px rgba(0, 122, 255, 0.4),
                    0 0 70px rgba(0, 102, 255, 0.3),
                    0 15px 30px -10px rgba(0, 0, 0, 0.15);
            }
            to {
                /* 蓝色霓虹灯效果 - 较大光晕 - 较亮状态 */
                box-shadow:
                    0 0 15px rgba(0, 149, 255, 0.8),
                    0 0 30px rgba(0, 149, 255, 0.7),
                    0 0 60px rgba(0, 122, 255, 0.6),
                    0 0 100px rgba(0, 102, 255, 0.5),
                    0 15px 30px -10px rgba(0, 0, 0, 0.2);
            }
        }
        
        /* Animation keyframes */
        @keyframes slideInFromLeft {
            0% {
                transform: translateX(-100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideInFromRight {
            0% {
                transform: translateX(100%);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Components styling */
        .dialogue-container {
            animation: slideInFromRight 1s ease-out 0.5s forwards;
            opacity: 0; /* Start hidden for animation */
        }
        
        .buttons-container {
            animation: fadeIn 1s ease-out 1.5s forwards;
            opacity: 0; /* Start hidden for animation */
        }
        
        .dialogue-bubble {
            position: relative;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: .4em;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .dialogue-bubble:after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 0;
            height: 0;
            border: 20px solid transparent;
            border-right-color: rgba(255, 255, 255, 0.15);
            border-left: 0;
            border-bottom: 0;
            margin-top: -10px;
            margin-left: -20px;
        }
        
        /* Apple-like nav bar with glass effect */
        .nav-bar {
            background: rgba(3, 83, 164, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease-out forwards;
        }
        
        /* Enhanced button styling */
        .primary-button {
            background: linear-gradient(135deg, #0070f3, #60a5fa);
            border: none;
            box-shadow: 0 10px 25px -5px rgba(0, 112, 243, 0.4);
            transition: all 0.3s ease;
        }
        
        .primary-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(0, 112, 243, 0.5);
        }
        
        .secondary-button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .secondary-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        /* Apple-like floating card effect */
        .floating-card {
            transform-style: preserve-3d;
            transition: transform 0.6s ease-out;
        }
        
        .floating-card:hover {
            transform: translateY(-10px) rotateX(5deg);
        }
        
        /* Responsive adjustments for smaller screens */
        @media (max-width: 768px) {
            .dialogue-bubble:after {
                left: 50%;
                top: -20px;
                border: 20px solid transparent;
                border-bottom-color: rgba(255, 255, 255, 0.15);
                border-top: 0;
                border-left-color: transparent;
                border-right-color: transparent;
                margin-left: -20px;
                margin-top: 0;
            }
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-6">

            </div>
        </div>
    </div>
    
    <!-- Featured Content Section -->
    <div class="w-full max-w-5xl mt-24 mb-16 px-6">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Card 1 -->
            <div class="floating-card bg-gradient-to-br from-blue-900/40 to-blue-800/40 backdrop-blur-md rounded-xl overflow-hidden border border-blue-700/30">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80"

                    <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">开始学习 →</a>

            </div>
            
            <!-- Card 2 -->
            <div class="floating-card bg-gradient-to-br from-blue-900/40 to-blue-800/40 backdrop-blur-md rounded-xl overflow-hidden border border-blue-700/30">
                <img src="https://images.unsplash.com/photo-1488590528505-98d2b5aba04b?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80" 
                     alt="数据分析实战" class="w-full h-40 object-cover">

                    <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">开始学习 →</a>

            <!-- Card 3 -->
            <div class="floating-card bg-gradient-to-br from-blue-900/40 to-blue-800/40 backdrop-blur-md rounded-xl overflow-hidden border border-blue-700/30">
                <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80"

                <div class="p-5">

    </div>

    <footer class="w-full py-6 text-center bg-blue-900/30 backdrop-blur-md border-t border-blue-800/30">
        <div class="container mx-auto">

</body>
